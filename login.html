<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AFF CLOUD MINING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0B1120; font-family: 'Inter', sans-serif; color: #E2E8F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 212, 255, 0.15); border-radius: 20px; padding: 40px 28px; width: 100%; max-width: 420px; }
        .btn-primary { background: linear-gradient(135deg, #00D4FF, #0099CC); color: #0B1120; font-weight: 700; padding: 14px; border-radius: 12px; width: 100%; border: none; font-size: 16px; cursor: pointer; }
        .btn-primary:hover { box-shadow: 0 0 40px rgba(0, 212, 255, 0.4); }
        .input-field { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #E2E8F0; font-size: 15px; outline: none; }
        .input-field:focus { border-color: #00D4FF; box-shadow: 0 0 15px rgba(0, 212, 255, 0.1); }
        .logo-icon { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #00D4FF, #0099CC); color: #0B1120; font-weight: 900; font-size: 22px; width: 48px; height: 48px; border-radius: 12px; margin: 0 auto 16px; }
        .link { color: #00D4FF; text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo-icon">AFF</div>
        <h1 style="text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px;">Selamat Datang</h1>
        <p style="text-align: center; color: #94A3B8; font-size: 14px; margin-bottom: 32px;">Login ke akun AFF CLOUD MINING</p>
        
        <form onsubmit="return login(event)" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label style="font-size: 13px; color: #94A3B8; margin-bottom: 6px; display: block;">Email</label>
                <input type="email" id="email" class="input-field" placeholder="Masukkan email Anda" required>
            </div>
            <div>
                <label style="font-size: 13px; color: #94A3B8; margin-bottom: 6px; display: block;">Password</label>
                <input type="password" id="password" class="input-field" placeholder="Masukkan password" required>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
                <label style="display: flex; align-items: center; gap: 6px; color: #94A3B8; cursor: pointer;">
                    <input type="checkbox"> Ingat saya
                </label>
                <a href="#" class="link">Lupa password?</a>
            </div>
            <button type="submit" class="btn-primary">🚀 Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #94A3B8;">
            Belum punya akun? <a href="register.html" class="link">Daftar sekarang</a>
        </p>
        <p style="text-align: center; margin-top: 8px;">
            <a href="index.html" style="color: #64748B; font-size: 13px; text-decoration: none;">← Kembali ke Beranda</a>
        </p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCFNC6a8avHwLc-dG2xlzPRUp4pAl8mULw",
        authDomain: "affcloudmining-2c85f.firebaseapp.com",
        projectId: "affcloudmining-2c85f",
        storageBucket: "affcloudmining-2c85f.firebasestorage.app",
        messagingSenderId: "19712591186",
        appId: "1:19712591186:web:e20bf4b8379400b3cd268b"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    function login(e) {
        e.preventDefault();
        
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value.trim();
        
        alert('Mencari: ' + email);
        
        db.collection('users')
            .where('email', '==', email)
            .where('password', '==', password)
            .get()
            .then(function(snapshot) {
                alert('Ditemukan: ' + snapshot.size + ' data');
                
                if (snapshot.empty) {
                    alert('Email atau password salah!');
                } else {
                    var userData = snapshot.docs[0].data();
                    alert('Login sukses! Halo ' + userData.nama);
                    localStorage.setItem('aff_user_nama', userData.nama);
                    localStorage.setItem('aff_user_email', userData.email);
                    window.location.href = 'dashboard.html';
                }
            })
            .catch(function(error) {
                alert('Error: ' + error.message);
            });
        
        return false;
    }
</script>

    })();
    </script>
</body>
</html>
