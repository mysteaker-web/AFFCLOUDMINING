<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - AFF CLOUD MINING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0B1120; font-family: 'Inter', sans-serif; color: #E2E8F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(153, 69, 255, 0.15); border-radius: 20px; padding: 40px 28px; width: 100%; max-width: 440px; }
        .btn-primary { background: linear-gradient(135deg, #9945FF, #14F195); color: #0B1120; font-weight: 700; padding: 14px; border-radius: 12px; width: 100%; border: none; font-size: 16px; cursor: pointer; }
        .input-field { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #E2E8F0; font-size: 15px; outline: none; }
        .input-field:focus { border-color: #14F195; }
        .logo-icon { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #9945FF, #14F195); color: #0B1120; font-weight: 900; font-size: 22px; width: 48px; height: 48px; border-radius: 12px; margin: 0 auto 16px; }
        .link { color: #14F195; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="glass-card" id="formCard">
        <div class="logo-icon">AFF</div>
        <h1 style="text-align:center;font-size:1.5rem;font-weight:700;">Buat Akun Baru</h1>
        <p style="text-align:center;color:#94A3B8;font-size:14px;margin-bottom:28px;">Daftar dan mulai mining Solana</p>
        <form onsubmit="return daftar(event)" style="display:flex;flex-direction:column;gap:14px;">
            <div><label style="font-size:13px;color:#94A3B8;">Nama Lengkap</label><input type="text" id="nama" class="input-field" placeholder="Nama" required></div>
            <div><label style="font-size:13px;color:#94A3B8;">Email</label><input type="email" id="email" class="input-field" placeholder="Email" required></div>
            <div><label style="font-size:13px;color:#94A3B8;">Password</label><input type="password" id="password" class="input-field" placeholder="Min 8 karakter" required></div>
            <div><label style="font-size:13px;color:#94A3B8;">Konfirmasi Password</label><input type="password" id="konfirmasi" class="input-field" placeholder="Ulangi" required></div>
            <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#94A3B8;"><input type="checkbox" required> Saya setuju <a href="#" class="link">Syarat</a></label>
            <button type="submit" class="btn-primary">🎯 Buat Akun</button>
        </form>
        <p style="text-align:center;margin-top:20px;font-size:14px;color:#94A3B8;">Sudah punya akun? <a href="login.html" class="link">Login</a></p>
    </div>
    <div class="glass-card" id="suksesCard" style="display:none;text-align:center;">
        <span style="font-size:60px;">✅</span>
        <h2 style="color:#14F195;">Pendaftaran Berhasil!</h2>
        <p style="color:#94A3B8;">Email telah dikirim.</p>
        <a href="login.html" class="btn-primary" style="display:inline-block;width:auto;padding:14px 28px;text-decoration:none;margin-top:16px;">🔑 Login</a>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCFNC6a8avHwLc-dG2xlzPRUp4pAl8mULw",
        authDomain: "affcloudmining-2c85f.firebaseapp.com",
        projectId: "affcloudmining-2c85f",
        storageBucket: "affcloudmining-2c85f.firebasestorage.app",
        messagingSenderId: "19712591186",
        appId: "1:19712591186:web:e20bf4b8379400b3cd268b"
    });
    var db = firebase.firestore();

    function daftar(e) {
        e.preventDefault();
        var nama = document.getElementById('nama').value;
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var konfirmasi = document.getElementById('konfirmasi').value;
        if (password !== konfirmasi) { alert('Password tidak cocok!'); return false; }
        if (password.length < 8) { alert('Password minimal 8 karakter!'); return false; }

        db.collection('users').add({
            nama: nama, email: email, password: password,
            tanggal: new Date().toLocaleDateString('id-ID'), status: 'Baru'
        }).then(function() {
            document.getElementById('formCard').style.display = 'none';
            document.getElementById('suksesCard').style.display = 'block';
            fetch('https://script.google.com/macros/s/AKfycbz3kutsYc9-bIh4-0I3FU2cap9f-jiDcwdxP-J6FKT1YM7et4xKGjhHqmmSFm0Zy7YBNw/exec', {
                method: 'POST',
                body: JSON.stringify({ nama: nama, email: email })
            });
        }).catch(function() {
            document.getElementById('formCard').style.display = 'none';
            document.getElementById('suksesCard').style.display = 'block';
        });
        return false;
    }
</script>

    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body>
</html>
